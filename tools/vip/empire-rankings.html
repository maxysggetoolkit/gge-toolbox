    const b64dec = (s) => Uint8Array.from(atob(s), (c) => c.charCodeAt(0));
    const b64enc = (u) => btoa(String.fromCharCode(...u));

    async function deriveKey(pass) {
      const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pass), "PBKDF2", false, ["deriveKey"]);
      return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: b64dec(SALT), iterations: ITER, hash: "SHA-256" },
        km, { name: "AES-GCM", length: 256 }, true, ["decrypt"]);
    }
    async function decryptWith(key) {
      const data = b64dec(PAYLOAD), iv = data.slice(0, 12), ct = data.slice(12);
      const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
      return new TextDecoder().decode(pt);
    }
    function render(html) { document.open(); document.write(html); document.close(); }

    async function unlock(pass) {
      const key = await deriveKey(pass);
      let html;
      try { html = await decryptWith(key); } catch (e) { return false; }
      const raw = await crypto.subtle.exportKey("raw", key);
      try { sessionStorage.setItem(SKEY, b64enc(new Uint8Array(raw))); } catch (e) {}
      render(html);
      return true;
    }

    async function runGate() {
      // Already unlocked this session on another VIP page? Reuse the key silently.
      const stored = sessionStorage.getItem(SKEY);
      if (stored) {
        try {
          const key = await crypto.subtle.importKey("raw", b64dec(stored), { name: "AES-GCM" }, true, ["decrypt"]);
          render(await decryptWith(key));
          return;
        } catch (e) {
          // We hold a valid session key but THIS page won't open with it — almost
          // always a stale cached copy left over from before a code rotation. Do
          // one cache-busting reload to pull the fresh page (the session key opens
          // it automatically). The ?cb guard means we only ever try this once.
          if (!/[?&]cb=/.test(location.search)) {
            location.replace(location.pathname + "?cb=" + Date.now());
            return;
          }
          sessionStorage.removeItem(SKEY);  // fresh page still failed → key is genuinely wrong
        }
      }
      const ui = document.getElementById("lock-ui");
      ui.hidden = false;
      const form = document.getElementById("lock-form"),
            input = document.getElementById("lock-code"),
            err = document.getElementById("lock-err"),
            btn = document.getElementById("lock-btn");
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const code = (input.value || "").trim();
        if (!code) return;
        err.textContent = ""; btn.disabled = true; btn.textContent = "Unlocking…";
        const ok = await unlock(code);
        if (!ok) {
          btn.disabled = false; btn.textContent = "Unlock";
          err.textContent = "Wrong code — ask Chemie for access.";
          input.select();
        }
      });
    }
    // Run after full load so document.open()/write() cleanly replaces the page
    // (during initial parse, document.write would append instead of replace).
    if (document.readyState === "complete") runGate();
    else window.addEventListener("load", runGate);
