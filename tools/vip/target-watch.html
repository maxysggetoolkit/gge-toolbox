      const ui = document.getElementById("lock-ui");
      ui.hidden = false;
      const form = document.getElementById("lock-form"),
            input = document.getElementById("lock-code"),
            err = document.getElementById("lock-err"),
            btn = document.getElementById("lock-btn");
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const code = (input.value || "").trim();
        if (!code) return;
        err.textContent = ""; btn.disabled = true; btn.textContent = "Unlocking…";
        const ok = await unlock(code);
        if (!ok) {
          btn.disabled = false; btn.textContent = "Unlock";
          err.textContent = "Wrong code — ask Chemie for access.";
          input.select();
        }
      });
    }
    // Run after full load so document.open()/write() cleanly replaces the page
    // (during initial parse, document.write would append instead of replace).
    if (document.readyState === "complete") runGate();
    else window.addEventListener("load", runGate);
  </script>
</body>
</html>
