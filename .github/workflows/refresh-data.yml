name: Refresh game data

# Regenerates every tool's data directly from Goodgame Studios' own game files
# (tools/_srcdata/pull.sh) and commits any changes. Keeps equipment, gacha pools,
# rift bosses, decorations, etc. current after a game maintenance.
on:
  # Daily safety net (07:00 UTC ~= 17:00 Sydney).
  schedule:
    - cron: "0 7 * * *"
  # Manual button in the Actions tab.
  workflow_dispatch:
  # External trigger — e.g. a Discord bot posting the maintenance announcement.
  # POST to the repo's dispatches endpoint with: {"event_type":"maintenance-done"}
  repository_dispatch:
    types: [maintenance-done]

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Refresh all tool data
        run: bash tools/refresh-all.sh

      - name: Commit changes if any
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add -A
            ts="$(date -u +'%Y-%m-%d %H:%M UTC')"
            git commit -m "chore(data): auto-refresh game data ($ts)" -m "Triggered by: ${{ github.event_name }}"
            git push
            echo "Committed refreshed data."
          else
            echo "No data changes — nothing to commit."
          fi
